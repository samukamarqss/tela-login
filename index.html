<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tela de Login</title>
     <link rel="stylesheet" href="./styles/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>


    <div class="login-wrapper">

      <!-- PAINEL ESQUERDO: formulário de login -->
      <div class="login-card">

        <div class="hero">
          <h2>Que bom te ver novamente!</h2>
          <p class="subtitulo">Insira suas credenciais para continuar.</p>
        </div>

        <div class="form-login">
          <form action="login-feito.html">

            <div>
              <label for="username">Usuário:</label>
              <input type="text" id="username" name="username" placeholder="Exemplo: samuel.marques" />
            </div>

            <div class="password-field">
              <label for="password">Senha:</label>
              <input type="password" id="password" name="password" placeholder="••••••••" />
            </div>

             <button class="entrar"  type="submit">Realizar login</button>
            
          </form>
        </div>

        <div class="rodape">
          <footer>
            <p>&copy; Samuca - Todos os direitos reservados.</p>
          </footer>
        </div>

      </div>
      <!-- FIM painel esquerdo -->

      <!--
        PAINEL DIREITO: a imagem é aplicada via CSS como
        background-image no seletor .login-panel-right.
        O caminho 'img/imagem.png' parte da pasta do projeto.
      -->
      <div class="login-panel-right"></div>
      <!-- FIM painel direito -->

    </div>

  </body>
</html>
